name: Build Pipeline

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build
    steps:
      - name: git-checkout
        uses: actions/checkout@v3

      - name: Install all dependencies
        run: npm install
      
      - name: Build
        run: npm run build

  test:
      runs-on: ubuntu-latest
      name: Test
      steps:
        - name: Test
          run: npm run test

  deploy:
      runs-on: ubuntu-latest
      name: Deploy
      steps:
        - name: Deploy
          uses: s0/git-publish-subdir-action@develop
          env:
            REPO: self
            BRANCH: build
            FOLDER: build
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            MESSAGE: "Build: ({sha}) {msg}"
        
 
